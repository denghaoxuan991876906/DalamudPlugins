name: Publish Plugin

# Updates a plugin's manifest in this repo from a release notification.
# Triggered by each plugin's own release workflow via repository_dispatch, or
# manually. Only updates plugins/<Internal>/<Internal>.json (AssemblyVersion +
# DownloadLinkInstall/Update) and regenerates pluginmaster.json — it does NOT
# download or re-host the zip (plugins host their own releases; for private
# source repos use the "direct write" pattern instead).
on:
  repository_dispatch:
    types: [publish-plugin]
  workflow_dispatch:
    inputs:
      internal_name:
        description: Plugin InternalName (must match its folder)
        required: true
      version:
        description: Assembly version (e.g. 1.0.0.0)
        required: true
      zip_url:
        description: Public URL of the plugin zip (plugin's own release asset)
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve inputs
        run: |
          {
            echo "INTERNAL=${{ github.event.client_payload.internal_name || github.event.inputs.internal_name }}"
            echo "VERSION=${{ github.event.client_payload.version || github.event.inputs.version }}"
            echo "ZIP_URL=${{ github.event.client_payload.zip_url || github.event.inputs.zip_url }}"
          } >> "$GITHUB_ENV"

      - name: Update manifest & regenerate pluginmaster.json
        run: |
          python3 - <<'PY'
          import json, pathlib, os
          internal = os.environ["INTERNAL"]
          version = os.environ["VERSION"]
          zip_url = os.environ["ZIP_URL"]
          p = pathlib.Path(f"plugins/{internal}/{internal}.json")
          if not p.exists():
              raise SystemExit(f"missing manifest: {p}")
          data = json.loads(p.read_text(encoding="utf-8"))
          data["AssemblyVersion"] = version
          data["DownloadLinkInstall"] = zip_url
          data["DownloadLinkUpdate"] = zip_url
          p.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"{internal} -> {version} @ {zip_url}")
          PY
          python3 generate_pluginmaster.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(publish): ${{ env.INTERNAL }} v${{ env.VERSION }}" || echo "nothing to commit"
          git push
